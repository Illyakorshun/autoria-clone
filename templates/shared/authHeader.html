            {% if user.is_authenticated %}
                <a href="/users/cabinet/" class="cabinet-link">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="8" r="4" stroke="white" stroke-width="2"/>
                        <path d="M5 20C5 16.6863 7.68629 14 12 14C16.3137 14 19 16.6863 19 20" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>{{ user.first_name|default:user.username }}</span>
                </a>
                <a href="/users/logout/" class="logout-link" onclick="return confirm('Ви впевнені?')">Вийти</a>
            {% else %}
                <a href="/users/authPage/" class="login-link">Увійти</a>
            {% endif %}
        </div>
    </div>
</header>

<style>
.auth-header {
    background: #1a1a2e;
    padding: 15px 0;
    border-bottom: 1px solid #333;
}
.auth-header .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1272px;
    margin: 0 auto;
    padding: 0 15px;
}
.auth-header .logo {
    display: flex;
    align-items: center;
    flex-shrink: 0;
}
.auth-header .header-title {
    flex: 1;
    margin-left: 30px;
}
.auth-header .header-title h1 {
    color: white;
    margin: 0;
    font-size: 22px;
    font-weight: 600;
}
.auth-header .header-title p {
    color: #aaa;
    margin: 0;
    font-size: 14px;
}
.auth-header .header-actions {
    display: flex;
    align-items: center;
    gap: 15px;
}
.auth-header .header-actions a {
    color: white;
    text-decoration: none;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.auth-header .header-actions a:hover {
    color: #DB5C4C;
}
.auth-header .header-actions .cabinet-link {
    color: white;
    padding: 5px 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
}
.auth-header .header-actions .cabinet-link:hover {
    background: rgba(255,255,255,0.2);
}
.auth-header .header-actions .login-link {
    color: white;
    padding: 8px 20px;
    background: #70c900;
    border-radius: 4px;
    font-weight: 600;
}
.auth-header .header-actions .login-link:hover {
    background: #5fb000;
}
.auth-header .header-actions .logout-link {
    color: #ff6b6b;
}
.auth-header .header-actions .logout-link:hover {
    color: #ff0000;
}

@media (max-width: 768px) {
    .auth-header .header-title h1 {
        font-size: 18px;
    }
    .auth-header .header-title p {
        font-size: 12px;
    }
    .auth-header .header-actions .cabinet-link span {
        display: none;
    }
}
</style>
